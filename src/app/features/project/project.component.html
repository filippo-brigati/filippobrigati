<div class="mt-10">
  <div
    class="rounded-lg overflow-hidden divide-y sm:divide-y-0 sm:grid sm:grid-cols-2 sm:gap-12"
    *ngIf="!this.isLoading else loadingTemplate"
  >
    <div
      class="rounded-lg relative group bg-white p-2 focus-within:ring-2 focus-within:ring-inset focus-within:ring-indigo-500 hover:bg-gray-100"
      *ngFor="let item of this.githubService.repos"
    >
      <div class="p-4">
        <h3 class="text-lg font-medium">
          <a [href]="this.item.html_url" target="_black" class="focus:outline-none">
            {{ this.item.name }}
          </a>
        </h3>
        <p class="mt-2 text-sm text-gray-500">
          {{ this.item.description }}
        </p>
      </div>
    </div>
  </div>
  <ng-template #loadingTemplate>
    <div class="mx-6"><p class="text-slate-900">Loading...</p></div>
  </ng-template>
</div>
